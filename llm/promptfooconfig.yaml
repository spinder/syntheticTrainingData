description: LLM judge — 6-dimension DIY repair Q&A quality evaluation (provider set via LLM_PROVIDER env var)

prompts:
  - file://prompts/evaluation_template.txt

providers:
  - id: file://providers/llm_judge_provider.py
    label: llm-judge

defaultTest:
  assert:
    - type: javascript
      value: "output.toLowerCase().trim() === 'pass'"

tests:
  # ------------------------------------------------------------------
  # Item 001 — Plumbing: dripping faucet  (expected: all 6 pass)
  # ------------------------------------------------------------------
  - description: "item_001_plumbing | D1 answer_completeness"
    vars:
      item: file://questions/items/item_001_plumbing.txt
      question: file://questions/q1.txt

  - description: "item_001_plumbing | D2 safety_specificity"
    vars:
      item: file://questions/items/item_001_plumbing.txt
      question: file://questions/q2.txt

  - description: "item_001_plumbing | D3 tool_realism"
    vars:
      item: file://questions/items/item_001_plumbing.txt
      question: file://questions/q3.txt

  - description: "item_001_plumbing | D4 scope_appropriateness"
    vars:
      item: file://questions/items/item_001_plumbing.txt
      question: file://questions/q4.txt

  - description: "item_001_plumbing | D5 context_clarity"
    vars:
      item: file://questions/items/item_001_plumbing.txt
      question: file://questions/q5.txt

  - description: "item_001_plumbing | D6 tip_usefulness"
    vars:
      item: file://questions/items/item_001_plumbing.txt
      question: file://questions/q6.txt

  # ------------------------------------------------------------------
